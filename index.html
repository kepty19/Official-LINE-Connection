<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kepty English</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #fff; }
        .btn { background: #00b900; color: white; border: none; padding: 18px 40px; border-radius: 50px; font-size: 18px; font-weight: bold; width: 80%; cursor: pointer; }
    </style>
</head>
<body>
    <button class="btn" onclick="start()">ページを開く</button>
    <p id="msg"></p>

    <script>
        // ★ここに先ほどのGASの「/exec」URLを入れてください
        const GAS_API_URL = "ここにGASのデプロイURLを貼り付け";
        const LIFF_ID = "2009159043-2ePS5qcs";

        async function start() {
            const msg = document.getElementById('msg');
            msg.innerText = "接続中...";
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }

                const profile = await liff.getProfile();
                
                // GASのAPIを叩く（標準的なfetch通信なのでiPhoneでも止まりません）
                const response = await fetch(`${GAS_API_URL}?userId=${profile.userId}`);
                const data = await response.json();
                
                msg.innerText = "ページへ移動します...";
                window.location.replace(data.url);
            } catch (err) {
                alert("エラー: " + err);
            }
        }
    </script>
</body>
</html>
