<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kepty English</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #fff; }
        .btn { background: #00b900; color: white; border: none; padding: 18px 40px; border-radius: 50px; font-size: 18px; font-weight: bold; width: 80%; cursor: pointer; }
        #msg { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <button class="btn" onclick="start()">ページを開く</button>
    <p id="msg">ボタンを押して開始してください</p>

    <script>
        // ==========================================
        // 1. ここに自分のGASの「/exec」URLを貼り付ける
        // ==========================================
        var BASE_URL = "https://script.google.com/macros/s/AKfycbyRxPJu4bkJ3qAscLqOHOuz9thCelzffkikBLYHtHuWcKqpXTYHxpWvIlGH0522R-KjdA/exec";

        // ==========================================
        // 2. ここに自分のLIFF IDを貼り付ける
        // ==========================================
        var LIFF_ID = "2009159043-2ePS5qcs";

        async function start() {
            var msg = document.getElementById('msg');
            msg.innerText = "接続中...";

            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }

                var profile = await liff.getProfile();
                var userId = profile.userId;

                // URLのゴミを掃除
                var cleanBaseUrl = BASE_URL.replace(/\s/g, "");
                var finalUrl = cleanBaseUrl + "?userId=" + encodeURIComponent(userId);

                msg.innerText = "データを照合中...";

                var xhr = new XMLHttpRequest();
                xhr.open("GET", finalUrl, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            var response = JSON.parse(xhr.responseText);
                            if (response.url) {
                                msg.innerText = "ページへ移動します...";
                                window.location.href = response.url;
                            } else {
                                alert("スプレッドシートにあなたのIDが見つかりませんでした。");
                            }
                        } else {
                            alert("GASとの通信に失敗しました。URLが正しいか確認してください。");
                        }
                    }
                };
                xhr.send();

            } catch (err) {
                alert("エラー: " + err.message);
                msg.innerText = "エラー停止";
            }
        }
    </script>
</body>
</html>
