<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kepty English</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* ラグジュアリーな背景設定 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a; /* マットブラック */
            color: #ffffff;
        }

        .container {
            text-align: center;
            width: 85%;
            max-width: 380px;
        }

        /* ロゴのスタイル */
        .logo {
            width: 180px; /* サイズは適宜調整してください */
            height: auto;
            margin-bottom: 30px;
        }

        /* プレミアムマットオレンジのボタン */
        .btn {
            background-color: #d17a3a; /* プレミアムマットオレンジ */
            color: white;
            border: none;
            padding: 20px 0;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            letter-spacing: 0.05em;
        }

        .btn:active {
            transform: scale(0.97);
            background-color: #b0652e; /* 押した時に少し暗く */
        }

        /* 頑張りましょうのテキスト */
        #msg {
            margin-top: 30px;
            font-size: 14px;
            color: #a0a0a0;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo v2.png" alt="Kepty" class="logo">
        
        <button class="btn" onclick="start()">Webアプリを開く</button>
        
        <p id="msg">英語のトレーニング 頑張りましょう</p>
    </div>

    <script>
        // ★重要1：ここに自分のGASのURLを正確に貼り付ける
        var BASE_URL = "https://script.google.com/macros/s/AKfycbyRxPJu4bkJ3qAscLqOHOuz9thCelzffkikBLYHtHuWcKqpXTYHxpWvIlGH0522R-KjdA/exec";

        // ★重要2：ここに自分のLIFF IDを貼り付ける
        var LIFF_ID = "2009159043-2ePS5qcs";

        async function start() {
            var msg = document.getElementById('msg');
            msg.innerText = "接続中...";

            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }

                var profile = await liff.getProfile();
                var userId = profile.userId;

                var cleanBaseUrl = BASE_URL.replace(/\s/g, "");
                var finalUrl = cleanBaseUrl + "?userId=" + encodeURIComponent(userId);

                msg.innerText = "データを照合中...";

                var xhr = new XMLHttpRequest();
                xhr.open("GET", finalUrl, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            var response = JSON.parse(xhr.responseText);
                            if (response.url) {
                                msg.innerText = "ページへ移動します...";
                                window.location.href = response.url;
                            } else {
                                alert("ユーザーIDが見つかりませんでした。");
                                msg.innerText = "ID未登録";
                            }
                        } else {
                            alert("通信エラーが発生しました。");
                            msg.innerText = "通信失敗";
                        }
                    }
                };
                xhr.send();

            } catch (err) {
                alert("エラー: " + err.message);
                msg.innerText = "エラー停止";
            }
        }
    </script>
</body>
</html>
